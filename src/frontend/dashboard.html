<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AI 사용량 대시보드</title>
<link rel="stylesheet" href="/styles.css">
</head>
<body>

<h1>AI 사용량 대시보드</h1>
<div class="subtitle">Codex 및 Claude Code 로컬 세션 사용량을 계정 / 날짜 / 모델별로 집계합니다.</div>

<div class="toolbar">
  <button id="refreshBtn">데이터 새로고침</button>
  <span id="status" aria-live="polite"></span>
</div>

<div class="panel">
  <h2>요청 한도 (Codex &times; Claude Code)</h2>
  <div id="rateLimits"></div>
</div>

<div class="panel">
  <h2>기간 필터 (전체 패널에 적용)</h2>
  <div class="tabs" id="globalRangeTabs" role="tablist" aria-label="기간 필터">
    <button class="tab-btn" data-range="1d" role="tab" aria-selected="false">최근 1일</button>
    <button class="tab-btn" data-range="7d" role="tab" aria-selected="false">최근 1주</button>
    <button class="tab-btn" data-range="30d" role="tab" aria-selected="false">최근 1개월</button>
    <button class="tab-btn" data-range="365d" role="tab" aria-selected="false">최근 1년</button>
    <button class="tab-btn active" data-range="all" role="tab" aria-selected="true">전체</button>
  </div>
</div>

<div class="panel">
  <h2>일별 토큰 사용량 (소스 &times; 계정)</h2>
  <div id="trendChart"></div>
  <div id="trendLegend" class="legend"></div>
</div>

<div class="grid-2">
  <div class="panel">
    <h2>계정별 합계</h2>
    <div class="table-scroll">
      <table id="accountTable">
        <thead>
          <tr>
            <th>소스</th><th>계정</th><th>입력</th><th>캐시 입력</th>
            <th>출력</th><th>합계</th><th>턴 수</th><th>예상 비용</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <div class="panel">
    <h2>모델별 분포 (총 토큰 기준)</h2>
    <div id="modelChart"></div>
    <div id="modelLegend" class="legend"></div>
  </div>
</div>

<div class="panel">
  <h2>상세 내역 (소스 &times; 계정 &times; 날짜 &times; 모델)</h2>
  <div class="tabs" id="sourceTabs" role="tablist" aria-label="소스 필터">
    <button class="tab-btn active" data-source="all" role="tab" aria-selected="true">전체</button>
    <button class="tab-btn" data-source="codex" role="tab" aria-selected="false">Codex</button>
    <button class="tab-btn" data-source="claude_code" role="tab" aria-selected="false">Claude Code</button>
  </div>
  <div class="filter-row">
    <label for="accountSelect">계정:</label>
    <select id="accountSelect">
      <option value="all">전체 (합산)</option>
    </select>
  </div>
  <div class="table-scroll">
    <table id="usageTable">
      <thead>
        <tr>
          <th>소스</th><th>계정</th><th>날짜</th><th>모델</th>
          <th>입력</th><th>캐시 입력</th><th>출력</th><th>합계</th><th>턴 수</th><th>예상 비용</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
  <div class="pagination" id="usagePagination"></div>
</div>

<div class="tooltip" id="tooltip"></div>

<script src="/js/util.js" defer></script>
<script src="/js/tables.js" defer></script>
<script src="/js/charts.js" defer></script>
<script src="/js/rate-limits.js" defer></script>
<script src="/js/main.js" defer></script>
</body>
</html>
